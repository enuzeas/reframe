<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reframe console</title>
<style>
:root {
  --bg: #0b0d12;
  --panel: #12151c;
  --panel-2: #171b24;
  --border: #232834;
  --text: #e6e9f0;
  --text-dim: #8a90a0;
  --accent: #5b8cff;
  --live: #33d17a;
  --warn: #f0b429;
  --off: #4a4f5c;
  --danger: #ff5c72;
  --radius: 10px;
  --ch-1: #ff5c72;
  --ch-2: #5b8cff;
  --ch-3: #33d17a;
  --ch-4: #f0b429;
  font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-size: 14px; overflow: hidden; }
.app { display: grid; grid-template-rows: 52px 1fr 96px; height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-bottom: 1px solid var(--border); background: var(--panel); }
.topbar .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: .04em; }
.topbar .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--live); box-shadow: 0 0 8px var(--live); }
.topbar .stats { display: flex; gap: 22px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.topbar .stats b { color: var(--text); font-weight: 600; }
.main { display: grid; grid-template-columns: 1fr 320px; min-height: 0; }
.preview-pane { position: relative; background: #000; display: flex; align-items: center; justify-content: center; padding: 18px; min-height: 0; }
.canvas-wrap { position: relative; box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,.6); max-width: 100%; max-height: 100%; }
.canvas-wrap img, .canvas-wrap canvas { display: block; max-width: 100%; max-height: calc(100vh - 250px); border-radius: 4px; }
.canvas-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: default; }
.canvas-hint { position: absolute; left: 24px; bottom: 24px; color: var(--text-dim); font-size: 12px; background: rgba(0,0,0,.5); padding: 6px 10px; border-radius: 6px; pointer-events: none; }
.side-panel { border-left: 1px solid var(--border); background: var(--panel); overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.side-panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin: 4px 4px 0; }
.channel-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; border-left: 3px solid var(--ch-color, var(--accent)); transition: box-shadow .15s ease; }
.channel-card.selected { box-shadow: 0 0 0 1px var(--ch-color, var(--accent)); }
.channel-card .row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.channel-card .chip { display: flex; align-items: center; gap: 8px; font-weight: 700; }
.channel-card .chip .swatch { width: 10px; height: 10px; border-radius: 3px; background: var(--ch-color); }
.channel-card .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; }
.status-dot.live { background: var(--live); box-shadow: 0 0 6px var(--live); }
.status-dot.waiting, .status-dot.lost { background: var(--warn); }
.icon-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 6px; font-size: 14px; line-height: 1; }
.icon-btn:hover { background: rgba(255,255,255,.06); color: var(--danger); }
.field { margin-top: 8px; }
.field label { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.toggle { position: relative; width: 38px; height: 20px; border-radius: 999px; background: var(--off); border: none; cursor: pointer; flex-shrink: 0; }
.toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left .15s ease; }
.toggle.on { background: var(--live); }
.toggle.on::after { left: 20px; }
.track-row { display: flex; align-items: center; gap: 8px; }
.track-target { flex: 1; font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; background: rgba(255,255,255,.03); }
.track-target .tid { color: var(--accent); font-weight: 700; }
.track-target.waiting { color: var(--warn); }
select, input[type=range] { width: 100%; }
select { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 5px 6px; font-size: 12px; }
input[type=range] { accent-color: var(--ch-color, var(--accent)); }
.url-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; }
.url-row code { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: var(--text-dim); }
.add-frame-card { border: 1px dashed var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: var(--text-dim); padding: 16px; cursor: pointer; font-size: 13px; gap: 6px; }
.add-frame-card:hover { border-color: var(--accent); color: var(--accent); }
.add-frame-card.disabled { opacity: .4; cursor: not-allowed; }
.sources-section { margin-top: 4px; }
.sources-section .apply-source { margin-top: 6px; }
.thumbs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; margin-bottom: 0.5rem; }
.thumbs button { padding: 0; border: 2px solid var(--border); border-radius: 4px; background: none; cursor: pointer; overflow: hidden; aspect-ratio: 4/3; }
.thumbs button img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumbs button.selected { border-color: var(--accent); }
.bottombar { border-top: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; gap: 8px; padding: 10px 18px; justify-content: center; }
.bottombar .row { display: flex; align-items: center; gap: 14px; }
.presets { display: flex; gap: 6px; }
.presets button { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.presets button:hover { border-color: var(--accent); }
.sep { width: 1px; height: 20px; background: var(--border); }
.mini-urls { display: flex; gap: 14px; flex: 1; overflow-x: auto; font-size: 11px; color: var(--text-dim); }
.mini-urls .u { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.mini-urls .sw { width: 8px; height: 8px; border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> REFRAME CONSOLE</div>
    <div class="stats">
      <span>파이프라인 <b id="fps">-</b> fps</span>
    </div>
  </div>

  <div class="main">
    <div class="preview-pane">
      <div class="canvas-wrap">
        <img id="preview" src="/api/preview.mjpg" alt="live preview">
        <canvas id="stage"></canvas>
        <div class="canvas-hint">점선 = 감지된 인물 · 실선 = 크롭 프레임(드래그 이동 / 모서리 리사이즈) · 추적 ON 상태에서 인물 클릭 시 바인딩</div>
      </div>
    </div>
    <div class="side-panel">
      <h2>채널 (최대 4)</h2>
      <div id="channelList"></div>

      <div class="sources-section">
        <h2>입력 소스</h2>
        <div class="thumbs" id="thumbs"></div>
        <select id="resolutions" title="해상도 선택" aria-label="해상도 선택"></select>
        <button type="button" class="add-frame-card apply-source" id="applySource">적용</button>
      </div>
    </div>
  </div>

  <div class="bottombar">
    <div class="row">
      <div class="presets">
        <button type="button" data-preset="multi">MULTI</button>
        <button type="button" data-preset="quad">QUAD+TRACK</button>
        <button type="button" data-preset="single">SINGLE</button>
      </div>
    </div>
    <div class="row">
      <div class="mini-urls" id="miniUrls"></div>
    </div>
  </div>
</div>

<script>
const CH_COLORS = ["#ff5c72", "#5b8cff", "#33d17a", "#f0b429"];
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");

let boxes = [];
let channelsState = [];   // last synced from server (normalized 0..1 x/y/w/h)
let frameW = 3840, frameH = 2160;
let selectedId = null;
let dragging = null;      // { id, mode, startX, startY, orig: {x,y,w,h} }
let selectedSource = null;

// renderPanel() rebuilds every card's DOM from scratch (innerHTML = "") on every WS
// tick (10Hz) - a real mouse click's mousedown-to-mouseup span can straddle one of
// those rebuilds, so the element the user pressed down on gets destroyed before
// mouseup fires and the click event never registers at all. Playwright's synthetic
// clicks are fast enough to reliably land between ticks, which is why automated
// testing didn't catch this. Suppress rebuilds while the panel is actively being
// clicked; a safety timeout guards against a stray pointerup (e.g. mouse released
// outside the window) leaving this stuck on.
let panelInteracting = false;
let panelInteractingTimer = null;
function markPanelInteracting() {
  panelInteracting = true;
  clearTimeout(panelInteractingTimer);
  panelInteractingTimer = setTimeout(() => { panelInteracting = false; }, 400);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function colorFor(id) { return CH_COLORS[(id - 1) % 4]; }

function resizeCanvas() {
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
window.addEventListener("resize", resizeCanvas);
preview.addEventListener("load", resizeCanvas, { once: true });

function displayedChannel(c) {
  if (dragging && dragging.id === c.id) return { ...c, ...dragging.current };
  return c;
}

function drawOverlay() {
  if (!canvas.width) resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.setLineDash([6, 5]);
  ctx.strokeStyle = "rgba(255,255,255,.55)";
  ctx.lineWidth = 2;
  const anyWaiting = channelsState.some(c => c.tracking && c.target_id === null);
  boxes.forEach(b => {
    const x = b.x1 * canvas.width, y = b.y1 * canvas.height;
    const w = (b.x2 - b.x1) * canvas.width, h = (b.y2 - b.y1) * canvas.height;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = anyWaiting ? "#f0b429" : "rgba(255,255,255,.55)";
    ctx.font = "bold 13px monospace";
    ctx.fillText("ID:" + b.track_id, x + 4, y - 6);
  });
  ctx.restore();

  channelsState.forEach(raw => {
    const c = displayedChannel(raw);
    const color = colorFor(c.id);
    const x = c.x * canvas.width, y = c.y * canvas.height;
    const w = c.w * canvas.width, h = c.h * canvas.height;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = c.id === selectedId ? 3 : 2;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = color + "22";
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, 26, 20);
    ctx.fillStyle = "#0b0d12";
    ctx.font = "bold 12px sans-serif";
    ctx.fillText("" + c.id, x + 9, y + 14);
    if (!c.tracking) {
      ctx.fillStyle = color;
      ctx.fillRect(x + w - 8, y + h - 8, 8, 8);
    }
    if (c.tracking && c.target_id === null) {
      ctx.strokeStyle = "#f0b429";
      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6);
      ctx.setLineDash([]);
    }
    ctx.restore();
  });
}

// ---- WebSocket: server is the source of truth ----
function connectWs() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (ev) => {
    const overlay = JSON.parse(ev.data);
    boxes = overlay.boxes ?? [];
    frameW = overlay.frame_w ?? frameW;
    frameH = overlay.frame_h ?? frameH;
    channelsState = overlay.channels ?? [];
    document.getElementById("fps").textContent = overlay.fps ?? "-";
    drawOverlay();
    if (!panelInteracting) renderPanel();
  };
  ws.onclose = () => setTimeout(connectWs, 1000);
}
connectWs();

// ---- pointer interaction (drag/resize channels, click-to-bind tracking) ----
function toNorm(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return { x: (clientX - rect.left) / rect.width, y: (clientY - rect.top) / rect.height };
}

function hitTestPerson(nx, ny) {
  for (const b of boxes) {
    if (nx >= b.x1 && nx <= b.x2 && ny >= b.y1 && ny <= b.y2) return b.track_id;
  }
  return null;
}

function hitTestChannel(nx, ny) {
  for (let i = channelsState.length - 1; i >= 0; i--) {
    const c = channelsState[i];
    if (c.tracking) continue; // tracked channels aren't manually dragged
    const hx = c.x + c.w, hy = c.y + c.h;
    if (Math.abs(nx - hx) < 0.02 && Math.abs(ny - hy) < 0.02) return { id: c.id, mode: "resize" };
    if (nx >= c.x && nx <= c.x + c.w && ny >= c.y && ny <= c.y + c.h) return { id: c.id, mode: "move" };
  }
  return null;
}

canvas.addEventListener("pointerdown", (e) => {
  const { x, y } = toNorm(e.clientX, e.clientY);

  const waitingChannel = channelsState.find(c => c.tracking && c.target_id === null);
  if (waitingChannel) {
    const pid = hitTestPerson(x, y);
    if (pid !== null) {
      patchChannel(waitingChannel.id, { target_id: pid });
      return;
    }
  }

  const hit = hitTestChannel(x, y);
  if (hit) {
    selectedId = hit.id;
    const c = channelsState.find(ch => ch.id === hit.id);
    dragging = { id: hit.id, mode: hit.mode, startX: x, startY: y, orig: { x: c.x, y: c.y, w: c.w, h: c.h }, current: { x: c.x, y: c.y, w: c.w, h: c.h } };
  } else {
    selectedId = null;
  }
  renderPanel();
});

window.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  const { x, y } = toNorm(e.clientX, e.clientY);
  const dx = x - dragging.startX, dy = y - dragging.startY;
  const o = dragging.orig;
  if (dragging.mode === "move") {
    dragging.current = { ...o, x: clamp(o.x + dx, 0, 1 - o.w), y: clamp(o.y + dy, 0, 1 - o.h) };
  } else {
    const w = clamp(o.w + dx, 480 / frameW, 1 - o.x);
    dragging.current = { ...o, w, h: w * 9 / 16 };
  }
  drawOverlay();
});

window.addEventListener("pointerup", () => {
  if (!dragging) return;
  const d = dragging.current;
  patchChannel(dragging.id, {
    x: Math.round(d.x * frameW), y: Math.round(d.y * frameH),
    w: Math.round(d.w * frameW), h: Math.round(d.h * frameH),
  });
  dragging = null;
});

window.addEventListener("keydown", (e) => {
  if ((e.key === "Delete" || e.key === "Backspace") && selectedId && document.activeElement === document.body) {
    deleteChannel(selectedId);
  }
});

// ---- API calls ----
async function patchChannel(id, body) {
  // Apply locally first: the WS overlay ticks at 10Hz regardless of this request's
  // round trip, and the server only applies the command on its next render frame -
  // so a broadcast reflecting the still-old state can arrive and overwrite the click
  // back to its previous value before the real update ever shows up. Toggling
  // tracking or changing the zoom preset looked like it "didn't work" (or worse,
  // flip-flopped) for exactly this reason. Same fix as the existing drag-override
  // pattern (`dragging.current`), just for click/select actions instead of drags.
  const c = channelsState.find(ch => ch.id === id);
  if (c) Object.assign(c, body);
  renderPanel();
  await fetch(`/api/channels/${id}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
}
async function deleteChannel(id) {
  await fetch(`/api/channels/${id}`, { method: "DELETE" });
  if (selectedId === id) selectedId = null;
}
async function addChannel() {
  if (channelsState.length >= 4) return;
  const w = 1440, h = w * 9 / 16;
  await fetch("/api/channels", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ x: Math.round((frameW - w) / 2), y: Math.round((frameH - h) / 2), w, h }),
  });
}
async function applyPreset(name) {
  await fetch(`/api/preset/${name}`, { method: "POST" });
}
document.querySelectorAll(".presets button").forEach(b => b.addEventListener("click", () => applyPreset(b.dataset.preset)));

// ---- side panel ----
function channelUrl(c) { return `rtsp://localhost:8554/out${c.id}`; }

function renderPanel() {
  const list = document.getElementById("channelList");
  list.innerHTML = "";
  [...channelsState].sort((a, b) => a.id - b.id).forEach(c => {
    const card = document.createElement("div");
    card.className = "channel-card" + (c.id === selectedId ? " selected" : "");
    card.style.setProperty("--ch-color", colorFor(c.id));
    card.addEventListener("click", () => { selectedId = c.id; renderPanel(); });

    const waiting = c.tracking && c.target_id === null;
    const target = c.target_id !== null ? `<span class="tid">ID:${c.target_id}</span> 추적 중` : "";

    card.innerHTML = `
      <div class="row1">
        <div class="chip"><span class="swatch"></span> 채널 ${c.id}</div>
        <div class="status">
          <span class="status-dot ${c.status}"></span>
          ${c.status === "live" ? "LIVE" : c.status === "waiting" ? "대상 선택 대기" : "대상 소실"}
          <button type="button" class="icon-btn" title="삭제" aria-label="채널 삭제" data-action="delete">✕</button>
        </div>
      </div>
      <div class="field">
        <label><span>트래킹</span></label>
        <div class="track-row">
          <button type="button" class="toggle ${c.tracking ? "on" : ""}" title="트래킹 켜기/끄기" aria-label="트래킹 켜기/끄기" data-action="toggle-track"></button>
          <div class="track-target ${waiting ? "waiting" : ""}">
            ${c.tracking ? (waiting ? "프리뷰에서 인물 클릭하여 바인딩" : target) : "수동 고정 프레임"}
          </div>
        </div>
      </div>
      <div class="field">
        <label><span>줌 프리셋</span></label>
        <select data-action="zoom" ${!c.tracking ? "disabled" : ""}>
          <option value="manual" ${c.zoom === "manual" ? "selected" : ""}>수동 크기</option>
          <option value="full" ${c.zoom === "full" ? "selected" : ""}>풀샷</option>
          <option value="waist" ${c.zoom === "waist" ? "selected" : ""}>웨이스트업</option>
          <option value="face" ${c.zoom === "face" ? "selected" : ""}>페이스 클로즈업</option>
        </select>
      </div>
      <div class="field">
        <label><span>스무딩 (One Euro)</span><span>${c.smoothing}</span></label>
        <input type="range" min="0" max="100" value="${c.smoothing}" data-action="smoothing">
      </div>
      <div class="url-row"><code>${channelUrl(c)}</code></div>
    `;

    card.querySelector('[data-action=delete]').addEventListener("click", (ev) => { ev.stopPropagation(); deleteChannel(c.id); });
    card.querySelector('[data-action=toggle-track]').addEventListener("click", (ev) => {
      ev.stopPropagation();
      patchChannel(c.id, c.tracking ? { tracking: false, target_id: null } : { tracking: true });
    });
    card.querySelector('[data-action=zoom]').addEventListener("change", (ev) => patchChannel(c.id, { zoom: ev.target.value }));
    card.querySelector('[data-action=smoothing]').addEventListener("input", (ev) => patchChannel(c.id, { smoothing: +ev.target.value }));

    list.appendChild(card);
  });

  const addCard = document.createElement("div");
  addCard.className = "add-frame-card" + (channelsState.length >= 4 ? " disabled" : "");
  addCard.textContent = "+ 프레임 추가 (" + channelsState.length + "/4)";
  addCard.addEventListener("click", addChannel);
  list.appendChild(addCard);

  const wrap = document.getElementById("miniUrls");
  wrap.innerHTML = "";
  [...channelsState].sort((a, b) => a.id - b.id).forEach(c => {
    const el = document.createElement("div");
    el.className = "u";
    el.innerHTML = `<span class="sw" style="background:${colorFor(c.id)}"></span> ${channelUrl(c)}`;
    wrap.appendChild(el);
  });
}

// ---- input source picker (M4) ----
async function loadResolutions(id) {
  const list = await (await fetch(`/api/sources/${id}/resolutions`)).json();
  const select = document.getElementById("resolutions");
  select.innerHTML = list.map(r => `<option value="${r.width}x${r.height}">${r.width}×${r.height}</option>`).join("");
}
async function loadSources() {
  const devices = await (await fetch("/api/sources")).json();
  const state = await (await fetch("/api/state")).json();
  const thumbs = document.getElementById("thumbs");
  thumbs.innerHTML = "";
  for (const dev of devices) {
    const btn = document.createElement("button");
    btn.className = dev.id === state.source_id ? "selected" : "";
    btn.innerHTML = `<img src="/api/sources/${dev.id}/thumbnail.jpg" alt="camera ${dev.id}">`;
    btn.onclick = () => {
      selectedSource = dev.id;
      [...thumbs.children].forEach(el => el.classList.remove("selected"));
      btn.classList.add("selected");
      loadResolutions(dev.id);
    };
    thumbs.appendChild(btn);
    if (dev.id === state.source_id) { selectedSource = dev.id; loadResolutions(dev.id); }
  }
}
document.getElementById("applySource").addEventListener("click", async () => {
  if (selectedSource === null) return;
  const [width, height] = document.getElementById("resolutions").value.split("x").map(Number);
  await fetch("/api/input", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ source_id: selectedSource, width, height }) });
});

loadSources();
renderPanel();
// #channelList itself persists across renderPanel() rebuilds (only its children get
// replaced), so a listener attached here - not per-card - survives them and catches
// mousedown via bubbling from any button/select/input inside.
document.getElementById("channelList").addEventListener("mousedown", markPanelInteracting);
</script>
</body>
</html>
