<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reframe console — mockup</title>
<style>
:root {
  --bg: #0b0d12;
  --panel: #12151c;
  --panel-2: #171b24;
  --border: #232834;
  --text: #e6e9f0;
  --text-dim: #8a90a0;
  --accent: #5b8cff;
  --live: #33d17a;
  --warn: #f0b429;
  --off: #4a4f5c;
  --danger: #ff5c72;
  --radius: 10px;
  --ch-1: #ff5c72;
  --ch-2: #5b8cff;
  --ch-3: #33d17a;
  --ch-4: #f0b429;
  font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", sans-serif;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; height: 100%; background: var(--bg); color: var(--text);
  font-size: 14px; overflow: hidden;
}
.app {
  display: grid;
  grid-template-rows: 52px 1fr 96px;
  height: 100vh;
}
/* ---------- header ---------- */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; border-bottom: 1px solid var(--border); background: var(--panel);
}
.topbar .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: .04em; }
.topbar .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--live); box-shadow: 0 0 8px var(--live); }
.topbar .stats { display: flex; gap: 22px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.topbar .stats b { color: var(--text); font-weight: 600; }

/* ---------- main ---------- */
.main {
  display: grid;
  grid-template-columns: 1fr 320px;
  min-height: 0;
}
.preview-pane {
  position: relative; background: #000;
  display: flex; align-items: center; justify-content: center;
  padding: 18px; min-height: 0;
}
.canvas-wrap { position: relative; box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,.6); }
#stage { display: block; border-radius: 4px; cursor: default; }
.canvas-hint {
  position: absolute; left: 24px; bottom: 24px; color: var(--text-dim);
  font-size: 12px; background: rgba(0,0,0,.5); padding: 6px 10px; border-radius: 6px;
  pointer-events: none;
}

/* ---------- side panel ---------- */
.side-panel {
  border-left: 1px solid var(--border); background: var(--panel);
  overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px;
}
.side-panel h2 {
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-dim); margin: 4px 4px 0;
}
.channel-card {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; border-left: 3px solid var(--ch-color, var(--accent));
  transition: box-shadow .15s ease;
}
.channel-card.selected { box-shadow: 0 0 0 1px var(--ch-color, var(--accent)); }
.channel-card .row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.channel-card .chip {
  display: flex; align-items: center; gap: 8px; font-weight: 700;
}
.channel-card .chip .swatch { width: 10px; height: 10px; border-radius: 3px; background: var(--ch-color); }
.channel-card .status {
  display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim);
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; }
.status-dot.live { background: var(--live); box-shadow: 0 0 6px var(--live); }
.status-dot.lost { background: var(--warn); }
.status-dot.off { background: var(--off); }
.icon-btn {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  padding: 4px; border-radius: 6px; font-size: 14px; line-height: 1;
}
.icon-btn:hover { background: rgba(255,255,255,.06); color: var(--danger); }

.field { margin-top: 8px; }
.field label {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text-dim); margin-bottom: 4px;
}
.toggle {
  position: relative; width: 38px; height: 20px; border-radius: 999px;
  background: var(--off); border: none; cursor: pointer; flex-shrink: 0;
}
.toggle::after {
  content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: #fff; transition: left .15s ease;
}
.toggle.on { background: var(--live); }
.toggle.on::after { left: 20px; }

.track-target {
  font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px;
  padding: 6px 8px; border-radius: 6px; background: rgba(255,255,255,.03);
}
.track-target .tid { color: var(--accent); font-weight: 700; }
.track-target.waiting { color: var(--warn); }

select, input[type=range] { width: 100%; }
select {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 6px; font-size: 12px;
}
input[type=range] { accent-color: var(--ch-color, var(--accent)); }

.url-row {
  display: flex; align-items: center; gap: 6px; margin-top: 8px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px;
}
.url-row code { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: var(--text-dim); }
.url-row button {
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer;
}
.url-row button:hover { border-color: var(--accent); color: var(--accent); }

.add-frame-card {
  border: 1px dashed var(--border); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); padding: 16px; cursor: pointer; font-size: 13px; gap: 6px;
}
.add-frame-card:hover { border-color: var(--accent); color: var(--accent); }
.add-frame-card.disabled { opacity: .4; cursor: not-allowed; }
.add-frame-card.disabled:hover { border-color: var(--border); color: var(--text-dim); }

/* ---------- bottom bar ---------- */
.bottombar {
  border-top: 1px solid var(--border); background: var(--panel);
  display: flex; flex-direction: column; gap: 8px; padding: 10px 18px; justify-content: center;
}
.bottombar .row { display: flex; align-items: center; gap: 14px; }
.presets { display: flex; gap: 6px; }
.presets button, .audio-select select {
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
}
.presets button:hover { border-color: var(--accent); }
.presets button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.audio-select { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 12px; }
.sep { width: 1px; height: 20px; background: var(--border); }
.mini-urls { display: flex; gap: 14px; flex: 1; overflow-x: auto; font-size: 11px; color: var(--text-dim); }
.mini-urls .u { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.mini-urls .sw { width: 8px; height: 8px; border-radius: 2px; }
.toast {
  position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
  background: var(--live); color: #04220f; padding: 8px 16px; border-radius: 8px;
  font-size: 12px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s ease;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand"><span class="dot"></span> REFRAME CONSOLE <span style="color:var(--text-dim); font-weight:400;">— 4K → 4×HD 라이브 리프레이밍</span></div>
    <div class="stats">
      <span>입력 <b>3840×2160 @30</b></span>
      <span>파이프라인 <b id="fps">29.7</b> fps</span>
      <span>추정 지연 <b id="latency">238</b> ms</span>
    </div>
  </div>

  <div class="main">
    <div class="preview-pane">
      <div class="canvas-wrap">
        <canvas id="stage" width="1280" height="720"></canvas>
        <div class="canvas-hint">점선 = 감지된 인물 · 실선 = 크롭 프레임(드래그 이동 / 모서리 리사이즈) · 추적 ON 상태에서 인물 클릭 시 바인딩</div>
      </div>
    </div>

    <div class="side-panel" id="sidePanel">
      <h2>채널 (최대 4)</h2>
      <div id="channelList"></div>
    </div>
  </div>

  <div class="bottombar">
    <div class="row">
      <div class="presets">
        <button data-preset="multi">MULTI</button>
        <button data-preset="quad">QUAD+TRACK</button>
        <button data-preset="single">SINGLE</button>
      </div>
      <div class="sep"></div>
      <div class="audio-select">
        오디오 소스
        <select>
          <option>캡처카드 라인 입력 (스트림에 먹싱)</option>
          <option>없음 (MJPEG 무음 폴백)</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="mini-urls" id="miniUrls"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">URL이 복사되었습니다</div>

<script>
const CH_COLORS = ["#ff5c72", "#5b8cff", "#33d17a", "#f0b429"];
const STAGE_W = 3840, STAGE_H = 2160; // internal coord space matches source 4K
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const scale = canvas.width / STAGE_W; // css px per source px

// ---- simulated detected people (lissajous wander within frame) ----
const people = [
  { id: 7,  base: [1400, 1100], amp: [520, 260], speed: [0.15, 0.21], phase: [0, 1.1], w: 420, h: 1100 },
  { id: 12, base: [2500, 1150], amp: [420, 220], speed: [0.12, 0.17], phase: [2.0, 0.3], w: 380, h: 1050 },
  { id: 19, base: [3150, 1300], amp: [280, 180], speed: [0.19, 0.13], phase: [1.4, 2.6], w: 360, h: 980 },
];

function personPos(p, t) {
  const cx = p.base[0] + Math.sin(t * p.speed[0] + p.phase[0]) * p.amp[0];
  const cy = p.base[1] + Math.sin(t * p.speed[1] + p.phase[1]) * p.amp[1] * 0.4;
  return { cx, cy, x1: cx - p.w / 2, y1: cy - p.h / 2, x2: cx + p.w / 2, y2: cy + p.h / 2 };
}

// ---- channel model ----
let channels = [];
let nextChannelId = 1;
let selectedId = null;
let interactive = { mode: null, id: null, startX: 0, startY: 0, orig: null };

function newChannel(x, y, w) {
  const h = w * 9 / 16;
  const id = nextChannelId++;
  return {
    id,
    color: CH_COLORS[(id - 1) % 4],
    x: clamp(x - w / 2, 0, STAGE_W - w),
    y: clamp(y - h / 2, 0, STAGE_H - h),
    w, h,
    tracking: false,
    targetId: null,
    zoom: "manual",
    smoothing: 50,
    smoothPos: null, // {cx, cy} lerped toward target
  };
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function initChannels() {
  channels = [
    Object.assign(newChannel(1400, 1100, 1440), { tracking: true, targetId: 7, zoom: "full" }),
    Object.assign(newChannel(2500, 1150, 1440), { tracking: true, targetId: 12, zoom: "waist" }),
    newChannel(700, 1600, 1200),
    Object.assign(newChannel(3150, 1300, 1200), { tracking: false }),
  ];
  channels.forEach(c => (c.id = null)); // reset id assignment below
  let id = 1;
  channels.forEach(c => { c.id = id; c.color = CH_COLORS[(id - 1) % 4]; id++; });
  nextChannelId = 5;
  selectedId = channels[0].id;
}
initChannels();

// ---- presets ----
function applyPreset(name) {
  document.querySelectorAll(".presets button").forEach(b => b.classList.toggle("active", b.dataset.preset === name));
  if (name === "multi") {
    channels = people.slice(0, 4).map((p, i) => {
      const ch = newChannel(p.base[0], p.base[1], 1440);
      ch.tracking = true; ch.targetId = p.id; ch.zoom = "full";
      return ch;
    });
    while (channels.length < 4) channels.push(newChannel(1920, 1080, 1200));
  } else if (name === "quad") {
    const qw = STAGE_W / 2, qh = STAGE_H / 2;
    channels = [
      Object.assign(newChannel(qw / 2, qh / 2, qw), { tracking: false }),
      Object.assign(newChannel(qw + qw / 2, qh / 2, qw), { tracking: false }),
      Object.assign(newChannel(qw / 2, qh + qh / 2, qw), { tracking: false }),
      Object.assign(newChannel(qw + qw / 2, qh + qh / 2, qw), { tracking: true, targetId: people[0].id, zoom: "full" }),
    ];
  } else if (name === "single") {
    const p = people[0];
    channels = [
      Object.assign(newChannel(p.base[0], p.base[1], 2200), { tracking: false, zoom: "manual" }),
      Object.assign(newChannel(p.base[0], p.base[1], 1440), { tracking: true, targetId: p.id, zoom: "full" }),
      Object.assign(newChannel(p.base[0], p.base[1], 900), { tracking: true, targetId: p.id, zoom: "waist" }),
      Object.assign(newChannel(p.base[0], p.base[1], 460), { tracking: true, targetId: p.id, zoom: "face" }),
    ];
  }
  let id = 1;
  channels.forEach(c => { c.id = id; c.color = CH_COLORS[(id - 1) % 4]; id++; });
  nextChannelId = 5;
  selectedId = channels[0]?.id ?? null;
  renderPanel();
}
document.querySelectorAll(".presets button").forEach(b => b.addEventListener("click", () => applyPreset(b.dataset.preset)));

// ---- draw loop ----
let t = 0;
let fps = 29.7, lastFrame = performance.now();

function draw() {
  const now = performance.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  fps = fps * 0.9 + (1 / Math.max(dt, 0.001)) * 0.1;
  document.getElementById("fps").textContent = Math.min(fps, 30.1).toFixed(1);
  document.getElementById("latency").textContent = (220 + Math.round(Math.sin(t * 0.5) * 25)).toString();
  t += 0.02;

  // background: simulated 4K studio feed
  const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0, "#161a22");
  g.addColorStop(1, "#05060a");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "rgba(255,255,255,.04)";
  for (let gx = 0; gx < canvas.width; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvas.height); ctx.stroke(); }
  for (let gy = 0; gy < canvas.height; gy += 40) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke(); }
  ctx.fillStyle = "rgba(255,255,255,.15)";
  ctx.font = "12px monospace";
  ctx.fillText("LIVE PREVIEW (다운스케일 프록시) — 실제 연동 시 WHEP /preview 스트림", 14, 20);

  // people (source coords -> css via scale)
  const positions = {};
  people.forEach(p => {
    const pos = personPos(p, t * 20);
    positions[p.id] = pos;
    ctx.save();
    ctx.setLineDash([6, 5]);
    ctx.strokeStyle = "rgba(255,255,255,.55)";
    ctx.lineWidth = 2;
    ctx.strokeRect(pos.x1 * scale, pos.y1 * scale, (pos.x2 - pos.x1) * scale, (pos.y2 - pos.y1) * scale);
    ctx.setLineDash([]);
    const anyWaiting = channels.some(c => c.tracking && !c.targetId);
    ctx.fillStyle = anyWaiting ? "#f0b429" : "rgba(255,255,255,.55)";
    ctx.font = "bold 13px monospace";
    ctx.fillText("ID:" + p.id, pos.x1 * scale + 4, pos.y1 * scale - 6);
    ctx.restore();
  });

  // channel crops
  channels.forEach(c => {
    if (c.tracking && c.targetId && positions[c.targetId]) {
      const target = positions[c.targetId];
      if (!c.smoothPos) c.smoothPos = { cx: target.cx, cy: target.cy };
      const alpha = 0.06 + (c.smoothing / 100) * 0.14; // one-euro-ish stand-in
      c.smoothPos.cx += (target.cx - c.smoothPos.cx) * alpha;
      c.smoothPos.cy += (target.cy - c.smoothPos.cy) * alpha;
      let h = c.h;
      if (c.zoom === "full") h = Math.max((target.y2 - target.y1) * 1.3, 700);
      if (c.zoom === "waist") h = Math.max((target.y2 - target.y1) * 0.7, 500);
      if (c.zoom === "face") h = Math.max((target.y2 - target.y1) * 0.32, 260);
      c.h = h; c.w = h * 16 / 9;
      c.x = clamp(c.smoothPos.cx - c.w / 2, 0, STAGE_W - c.w);
      c.y = clamp(c.smoothPos.cy - c.h / 2, 0, STAGE_H - c.h);
    }
    ctx.save();
    ctx.strokeStyle = c.color;
    ctx.lineWidth = c.id === selectedId ? 3 : 2;
    ctx.strokeRect(c.x * scale, c.y * scale, c.w * scale, c.h * scale);
    ctx.fillStyle = c.color + "22";
    ctx.fillRect(c.x * scale, c.y * scale, c.w * scale, c.h * scale);
    // label
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x * scale, c.y * scale, 26, 20);
    ctx.fillStyle = "#0b0d12";
    ctx.font = "bold 12px sans-serif";
    ctx.fillText("" + c.id, c.x * scale + 9, c.y * scale + 14);
    // resize handle
    const hx = (c.x + c.w) * scale, hy = (c.y + c.h) * scale;
    ctx.fillStyle = c.color;
    ctx.fillRect(hx - 8, hy - 8, 8, 8);
    // tracking waiting glow
    if (c.tracking && !c.targetId) {
      ctx.strokeStyle = "#f0b429";
      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 1.5;
      ctx.strokeRect(c.x * scale - 3, c.y * scale - 3, c.w * scale + 6, c.h * scale + 6);
      ctx.setLineDash([]);
    }
    ctx.restore();
  });

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ---- pointer interaction on canvas ----
function toStage(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const px = (clientX - rect.left) * (canvas.width / rect.width);
  const py = (clientY - rect.top) * (canvas.height / rect.height);
  return { x: px / scale, y: py / scale };
}

function hitTestPerson(sx, sy) {
  for (const p of people) {
    const pos = personPos(p, t * 20);
    if (sx >= pos.x1 && sx <= pos.x2 && sy >= pos.y1 && sy <= pos.y2) return p.id;
  }
  return null;
}

function hitTestChannel(sx, sy) {
  for (let i = channels.length - 1; i >= 0; i--) {
    const c = channels[i];
    const hx = c.x + c.w, hy = c.y + c.h;
    if (Math.abs(sx - hx) < 60 / scale && Math.abs(sy - hy) < 60 / scale) return { id: c.id, mode: "resize" };
    if (sx >= c.x && sx <= c.x + c.w && sy >= c.y && sy <= c.y + c.h) return { id: c.id, mode: "move" };
  }
  return null;
}

canvas.addEventListener("pointerdown", e => {
  const { x, y } = toStage(e.clientX, e.clientY);

  // if any channel is waiting for a tracking target, try binding first
  const waitingChannel = channels.find(c => c.tracking && !c.targetId);
  if (waitingChannel) {
    const pid = hitTestPerson(x, y);
    if (pid !== null) {
      waitingChannel.targetId = pid;
      waitingChannel.smoothPos = null;
      renderPanel();
      return;
    }
  }

  const hit = hitTestChannel(x, y);
  if (hit) {
    selectedId = hit.id;
    const c = channels.find(ch => ch.id === hit.id);
    interactive = { mode: hit.mode, id: hit.id, startX: x, startY: y, orig: { ...c } };
    renderPanel();
  } else {
    selectedId = null;
    renderPanel();
  }
});

window.addEventListener("pointermove", e => {
  if (!interactive.mode) return;
  const { x, y } = toStage(e.clientX, e.clientY);
  const c = channels.find(ch => ch.id === interactive.id);
  if (!c || c.tracking) return; // tracked channels aren't manually dragged
  const dx = x - interactive.startX, dy = y - interactive.startY;
  if (interactive.mode === "move") {
    c.x = clamp(interactive.orig.x + dx, 0, STAGE_W - c.w);
    c.y = clamp(interactive.orig.y + dy, 0, STAGE_H - c.h);
  } else if (interactive.mode === "resize") {
    const newW = clamp(interactive.orig.w + dx, 480, STAGE_W - c.x);
    c.w = newW; c.h = newW * 9 / 16;
  }
});

window.addEventListener("pointerup", () => { interactive = { mode: null }; });

window.addEventListener("keydown", e => {
  if (e.key === "Delete" || e.key === "Backspace") {
    if (selectedId && document.activeElement === document.body) {
      removeChannel(selectedId);
    }
  }
});

// ---- side panel rendering ----
function removeChannel(id) {
  channels = channels.filter(c => c.id !== id);
  if (selectedId === id) selectedId = channels[0]?.id ?? null;
  renderPanel();
}

function addChannel() {
  if (channels.length >= 4) return;
  const ch = newChannel(1920, 1080, 1200);
  ch.id = nextChannelId++;
  ch.color = CH_COLORS[(ch.id - 1) % 4];
  channels.push(ch);
  selectedId = ch.id;
  renderPanel();
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove("show"), 1400);
}

function channelUrl(c) { return `http://studio.local:8889/out${c.id}`; }

function renderPanel() {
  const list = document.getElementById("channelList");
  list.innerHTML = "";
  channels.sort((a, b) => a.id - b.id).forEach(c => {
    const card = document.createElement("div");
    card.className = "channel-card" + (c.id === selectedId ? " selected" : "");
    card.style.setProperty("--ch-color", c.color);
    card.addEventListener("click", () => { selectedId = c.id; renderPanel(); });

    const target = c.targetId ? `<span class="tid">ID:${c.targetId}</span> 추적 중` : "";
    const waiting = c.tracking && !c.targetId;

    card.innerHTML = `
      <div class="row1">
        <div class="chip"><span class="swatch"></span> 채널 ${c.id}</div>
        <div class="status">
          <span class="status-dot ${waiting ? 'lost' : 'live'}"></span>
          ${waiting ? '대상 선택 대기' : 'LIVE'}
          <button class="icon-btn" title="삭제" data-action="delete">✕</button>
        </div>
      </div>

      <div class="field">
        <label><span>트래킹</span></label>
        <div style="display:flex; align-items:center; gap:8px;">
          <button class="toggle ${c.tracking ? 'on' : ''}" data-action="toggle-track"></button>
          <div class="track-target ${waiting ? 'waiting' : ''}" style="flex:1;">
            ${c.tracking ? (waiting ? '프리뷰에서 인물 클릭하여 바인딩' : target) : '수동 고정 프레임'}
          </div>
        </div>
      </div>

      <div class="field">
        <label><span>줌 프리셋</span></label>
        <select data-action="zoom" ${!c.tracking ? "disabled" : ""}>
          <option value="manual" ${c.zoom === "manual" ? "selected" : ""}>수동 크기</option>
          <option value="full" ${c.zoom === "full" ? "selected" : ""}>풀샷</option>
          <option value="waist" ${c.zoom === "waist" ? "selected" : ""}>웨이스트업</option>
          <option value="face" ${c.zoom === "face" ? "selected" : ""}>페이스 클로즈업</option>
        </select>
      </div>

      <div class="field">
        <label><span>스무딩 (One Euro)</span><span>${c.smoothing}</span></label>
        <input type="range" min="0" max="100" value="${c.smoothing}" data-action="smoothing">
      </div>

      <div class="url-row">
        <code>${channelUrl(c)}</code>
        <button data-action="copy">복사</button>
      </div>
    `;

    card.querySelector('[data-action=delete]').addEventListener("click", ev => { ev.stopPropagation(); removeChannel(c.id); });
    card.querySelector('[data-action=toggle-track]').addEventListener("click", ev => {
      ev.stopPropagation();
      c.tracking = !c.tracking;
      if (!c.tracking) { c.targetId = null; c.smoothPos = null; }
      renderPanel();
    });
    card.querySelector('[data-action=zoom]').addEventListener("change", ev => { c.zoom = ev.target.value; });
    card.querySelector('[data-action=smoothing]').addEventListener("input", ev => { c.smoothing = +ev.target.value; });
    card.querySelector('[data-action=copy]').addEventListener("click", ev => {
      ev.stopPropagation();
      navigator.clipboard?.writeText(channelUrl(c)).catch(() => {});
      showToast(`채널 ${c.id} URL 복사됨 — OBS 브라우저 소스에 붙여넣으세요`);
    });

    list.appendChild(card);
  });

  const addCard = document.createElement("div");
  addCard.className = "add-frame-card" + (channels.length >= 4 ? " disabled" : "");
  addCard.textContent = "+ 프레임 추가 (" + channels.length + "/4)";
  addCard.addEventListener("click", addChannel);
  list.appendChild(addCard);

  renderMiniUrls();
}

function renderMiniUrls() {
  const wrap = document.getElementById("miniUrls");
  wrap.innerHTML = "";
  channels.sort((a, b) => a.id - b.id).forEach(c => {
    const el = document.createElement("div");
    el.className = "u";
    el.innerHTML = `<span class="sw" style="background:${c.color}"></span> ${channelUrl(c)}`;
    wrap.appendChild(el);
  });
}

renderPanel();
</script>
</body>
</html>
